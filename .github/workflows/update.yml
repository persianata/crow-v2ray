name: Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - run: pip install requests
      
      - name: Run script
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python .config/scraper.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sub*.txt
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No new configs. Updating timestamp to keep repository active."
            date > last_update.txt
            git add last_update.txt
            git commit -m "Keep-alive: Update timestamp"
          else
            git commit -m "Update sub files - $(date '+%Y-%m-%d %H:%M:%S')"
          fi
          git push
