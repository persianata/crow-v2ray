name: Update
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # تغییر از v3 به v4
        
      - name: Set up Python
        uses: actions/setup-python@v5  # تغییر از v4 به v5
        with:
          python-version: '3.9'
